<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Moderation - CA Office Utility</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #06080d;
            --bg-card: rgba(17, 25, 40, 0.75);
            --accent-primary: #3b82f6;
            --accent-rose: #f43f5e;
            --accent-emerald: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-medium: rgba(255, 255, 255, 0.1);
            --radius-md: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }
        
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid var(--border-medium);
        }
        h1 { font-family: 'Outfit', sans-serif; font-size: 1.75rem; }
        h1 span { color: var(--accent-primary); }

        .auth-check { 
            text-align: center; padding: 60px; background: var(--bg-card); 
            border-radius: var(--radius-md); border: 1px solid var(--border-medium);
        }

        .stats-row { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 40px; 
        }
        .stat-card { 
            background: var(--bg-card); padding: 24px; border-radius: var(--radius-md); 
            border: 1px solid var(--border-medium); text-align: center;
        }
        .stat-value { font-size: 2rem; font-weight: 700; color: var(--accent-primary); }
        .stat-label { font-size: 0.85rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

        .filter-bar { 
            margin-bottom: 24px; display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
        }
        .filter-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-medium); 
            color: var(--text-secondary); padding: 8px 16px; border-radius: 8px; 
            cursor: pointer; font-size: 0.9rem; transition: 0.2s; white-space: nowrap;
        }
        .filter-btn.active { background: var(--accent-primary); color: #fff; border-color: var(--accent-primary); }

        .comment-list { display: flex; flex-direction: column; gap: 20px; }
        .comment-item { 
            background: var(--bg-card); padding: 24px; border-radius: var(--radius-md); 
            border: 1px solid var(--border-medium); display: grid; gap: 16px;
        }
        .comment-meta { display: flex; justify-content: space-between; align-items: flex-start; }
        .post-info { font-size: 0.75rem; color: var(--accent-primary); font-weight: 600; margin-bottom: 4px; display: block; }
        .author-name { font-weight: 700; font-size: 1.1rem; }
        .comment-date { font-size: 0.8rem; color: var(--text-secondary); }
        .comment-text { line-height: 1.6; color: #e2e8f0; }
        .comment-actions { display: flex; gap: 12px; margin-top: 8px; }
        
        .btn { 
            padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; 
            cursor: pointer; border: none; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .btn-approve { background: var(--accent-emerald); color: #fff; }
        .btn-reject { background: var(--accent-rose); color: #fff; }
        .btn-delete { background: rgba(255,255,255,0.1); color: var(--text-secondary); }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-badge { 
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; 
            padding: 4px 10px; border-radius: 100px;
        }
        .status-badge.status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-badge.status-approved { background: rgba(16, 185, 129, 0.2); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-badge.status-rejected { background: rgba(244, 63, 94, 0.2); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.3); }

        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin <span>Moderation</span></h1>
            <div id="user-info" style="font-size: 0.9rem; color: var(--text-secondary);"></div>
        </header>

        <div id="auth-container">
            <div class="auth-check">
                <p>Checking authentication...</p>
            </div>
        </div>

        <div id="admin-content" style="display: none;">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="count-pending">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="count-approved">0</div>
                    <div class="stat-label">Approved</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="count-total">0</div>
                    <div class="stat-label">Total</div>
                </div>
            </div>

            <div class="filter-bar">
                <button class="filter-btn active" data-status="pending">Pending</button>
                <button class="filter-btn" data-status="approved">Approved</button>
                <button class="filter-btn" data-status="rejected">Rejected</button>
                <button class="filter-btn" data-status="all">All</button>
            </div>

            <div class="comment-list" id="comment-list">
                <div class="loading">Loading comments...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { 
            db, auth, onAuthStateChanged,
            collection, getDocs, query, where, orderBy, doc, updateDoc, deleteDoc
        } from "./firebase-init.js";

        let currentFilter = 'pending';
        let allComments = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('user-info').innerText = `Logged in as: ${user.email}`;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                loadComments();
            } else {
                document.getElementById('auth-container').innerHTML = `
                    <div class="auth-check">
                        <h2 style="margin-bottom:16px;">Access Denied</h2>
                        <p style="color:var(--text-secondary); margin-bottom:24px;">You must be logged in as an administrator to access this page.</p>
                        <a href="index.html" style="color:var(--accent-primary); text-decoration:none; font-weight:600;">Back to Home</a>
                    </div>
                `;
            }
        });

        async function loadComments() {
            const list = document.getElementById('comment-list');
            list.innerHTML = '<div class="loading">Loading comments...</div>';

            try {
                let q = collection(db, "post_comments");
                
                if (currentFilter !== 'all') {
                    const q2 = query(q, where("status", "==", currentFilter), orderBy("createdAt", "desc"));
                    const snap = await getDocs(q2);
                    allComments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                } else {
                    const q2 = query(q, orderBy("createdAt", "desc"));
                    const snap = await getDocs(q2);
                    allComments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                }
                
                updateStats();
                renderComments();
            } catch (err) {
                console.error(err);
                list.innerHTML = `<div class="loading" style="color:var(--accent-rose);">Error: ${err.message}</div>`;
            }
        }

        function updateStats() {
            // This is a bit inefficient (loading all just for stats), but works for now.
            // For real stats, we'd query each count.
            document.getElementById('count-pending').innerText = allComments.filter(c => c.status === 'pending').length;
            document.getElementById('count-approved').innerText = allComments.filter(c => c.status === 'approved').length;
            document.getElementById('count-total').innerText = allComments.length;
        }

        function renderComments() {
            const list = document.getElementById('comment-list');
            if (allComments.length === 0) {
                list.innerHTML = '<div class="loading">No comments found in this category.</div>';
                return;
            }

            list.innerHTML = allComments.map(c => `
                <div class="comment-item" id="comment-${c.id}">
                    <div class="comment-meta">
                        <div>
                            <span class="post-info">POST ID: ${c.postId}</span>
                            <div class="author-name">${c.name}</div>
                            <div class="comment-date">${c.createdAt ? new Date(c.createdAt.toDate()).toLocaleString() : 'N/A'}</div>
                        </div>
                        <span class="status-badge status-${c.status}">${c.status}</span>
                    </div>
                    <p class="comment-text">${c.text}</p>
                    <div class="comment-actions">
                        ${c.status !== 'approved' ? `
                            <button class="btn btn-approve" onclick="window.updateStatus('${c.id}', 'approved')">Approve</button>
                        ` : ''}
                        ${c.status !== 'rejected' ? `
                            <button class="btn btn-reject" onclick="window.updateStatus('${c.id}', 'rejected')">Reject</button>
                        ` : ''}
                        <button class="btn btn-delete" onclick="window.deleteComment('${c.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        window.updateStatus = async (id, status) => {
            try {
                await updateDoc(doc(db, "post_comments", id), { status });
                loadComments();
            } catch (err) {
                alert("Error updating status: " + err.message);
            }
        };

        window.deleteComment = async (id) => {
            if (!confirm("Are you sure you want to delete this comment forever?")) return;

            try {
                await deleteDoc(doc(db, "post_comments", id));
                loadComments();
            } catch (err) {
                alert("Error deleting comment: " + err.message);
            }
        };

        // Filter events
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.status;
                loadComments();
            });
        });
    </script>
</body>
</html>
