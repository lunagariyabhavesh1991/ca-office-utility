name: Secure Build & Multi-Repo Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pyarmor
      
      - name: Secure Build Process
        run: |
          python build_secure.py
          
      - name: Verify Build Artifact
        run: |
          ls -R dist/
          if [ ! -f dist/CA_Office_PDF_Utility_v1.1.2.zip ]; then
            echo "Error: Build artifact not found!"
            exit 1
          fi
        shell: bash

      - name: Upload to Public Repository
        if: success()
        shell: pwsh
        run: |
          Write-Host "Verifying dist contents..."
          Get-ChildItem -Path dist/
          $ZIP_FILE = "dist/CA_Office_PDF_Utility_v1.1.2.zip"
          if (Test-Path $ZIP_FILE) {
            Write-Host "Uploading $ZIP_FILE to marutitechsolutions/ca-office-utility..."
            # Try upload, then create if missing
            $err = gh release upload v1.1.2 $ZIP_FILE --repo marutitechsolutions/ca-office-utility --clobber 2>&1
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Initial upload failed or release missing. Attempting creation..."
              gh release create v1.1.2 $ZIP_FILE --repo marutitechsolutions/ca-office-utility --title "v1.1.2 Production Release" --notes "Official stabilized build."
            }
          } else {
            Write-Error "Build artifact missing: $ZIP_FILE"
            exit 1
          }
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install System Dependencies
        run: brew install tesseract
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          grep -vE "pywin32|mscapi" requirements.txt > req_mac.txt
          pip install -r req_mac.txt
          pip install pyinstaller pyarmor
          
      - name: Secure Build Process (Mac)
        run: |
          python build_secure.py
          
      - name: Verify Build Artifact (Mac)
        run: |
          ls -R dist/
          if [ ! -f dist/CA_Office_PDF_Utility_v1.1.2.zip ]; then
            echo "Error: Build artifact not found!"
            exit 1
          fi

      - name: Upload to Public Repository (Mac)
        if: success()
        run: |
          echo "Uploading (Mac) to marutitechsolutions/ca-office-utility..."
          # Atomic single-line Bash command for the Mac/Linux runner
          gh release upload v1.1.2 dist/CA_Office_PDF_Utility_v1.1.2.zip --repo marutitechsolutions/ca-office-utility --clobber || gh release create v1.1.2 dist/CA_Office_PDF_Utility_v1.1.2.zip --repo marutitechsolutions/ca-office-utility --title "v1.1.2 Production Release" --notes "Official stabilized build (macOS)."
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
