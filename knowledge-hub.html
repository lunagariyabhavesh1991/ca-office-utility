<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ES3YSGF1WH"></script>
    <script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Hub &mdash; CA Office PDF Utility</title>
    <meta name="description" content="Daily tax updates, GST, Income Tax, TDS, and ROC/MCA knowledge for CA professionals.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #06080d;
            --bg-secondary: #0c1018;
            --bg-tertiary: #111827;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-medium: rgba(255, 255, 255, 0.1);
            --border-accent: rgba(59, 130, 246, 0.3);
            --accent-primary: #3b82f6;
            --accent-primary-glow: rgba(59, 130, 246, 0.15);
            --accent-emerald: #10b981;
            --accent-rose: #f43f5e;
            --accent-amber: #f59e0b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.5);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }
        a { text-decoration: none; color: inherit; }

        .bg-grid {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -3; pointer-events: none;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Navbar */
        .navbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
            padding: 0 24px; height: 72px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(6, 8, 13, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }
        .navbar-inner { display: flex; align-items: center; justify-content: space-between; max-width: 1200px; width: 100%; }
        .navbar-brand { display: flex; align-items: center; gap: 12px; }
        .navbar-logo { width: 36px; height: 36px; border-radius: 8px; filter: drop-shadow(0 0 8px rgba(59,130,246,0.3)); }
        .navbar-brand-text { font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.1rem; }
        .navbar-brand-text span { color: var(--accent-primary); }
        .navbar-links { display: flex; align-items: center; gap: 32px; list-style: none; }
        .navbar-links a { font-size: 0.875rem; font-weight: 500; color: var(--text-secondary); transition: 0.2s; }
        .navbar-links a:hover { color: var(--text-primary); }
        .navbar-cta {
            font-size: 0.85rem !important; font-weight: 600 !important;
            color: #fff !important; background: var(--accent-primary);
            padding: 8px 20px; border-radius: 8px;
            box-shadow: 0 4px 12px rgba(59,130,246,0.25);
        }

        /* Page Header */
        .page-header { padding: 140px 0 60px; text-align: center; }
        .page-label {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--accent-primary);
            margin-bottom: 16px; padding: 6px 16px;
            background: var(--accent-primary-glow);
            border: 1px solid rgba(59,130,246,0.15); border-radius: 100px;
        }
        .page-title { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 800; margin-bottom: 16px; }
        .page-subtitle { font-size: 1.1rem; color: var(--text-secondary); max-width: 640px; margin: 0 auto; }

        /* Filter Bar */
        .filter-bar {
            margin-bottom: 48px; display: flex; flex-wrap: wrap;
            align-items: center; justify-content: space-between; gap: 24px;
            padding: 24px; background: var(--bg-card);
            border: 1px solid var(--border-medium); border-radius: var(--radius-xl);
            backdrop-filter: blur(12px);
        }
        .filter-categories { display: flex; flex-wrap: wrap; gap: 10px; }
        .filter-btn {
            padding: 8px 18px; border-radius: 100px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
            color: var(--text-secondary); font-size: 0.875rem; font-weight: 500;
            cursor: pointer; transition: 0.2s;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
        .filter-btn.active { background: var(--accent-primary); color: #fff; border-color: var(--accent-primary); }

        .search-box { position: relative; width: 100%; max-width: 320px; }
        .search-box input {
            width: 100%; padding: 10px 16px 10px 40px;
            background: rgba(0,0,0,0.2); border: 1px solid var(--border-medium);
            border-radius: 10px; color: #fff; font-size: 0.9rem; outline: none;
        }
        .search-box input:focus { border-color: var(--accent-primary); }
        .search-box svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); width: 16px; height: 16px; }

        /* Posts Grid */
        .posts-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px; margin-bottom: 80px;
        }
        .post-card {
            background: var(--bg-card); border: 1px solid var(--border-medium);
            border-radius: var(--radius-xl); padding: 28px;
            transition: var(--transition-smooth); display: flex; flex-direction: column; gap: 16px;
            position: relative; overflow: hidden;
        }
        .post-card:hover { border-color: var(--border-accent); transform: translateY(-4px); background: var(--bg-card-hover); }
        
        .post-highlight {
            position: absolute; top: 0; right: 0;
            padding: 4px 12px; background: var(--accent-amber);
            color: #000; font-size: 0.65rem; font-weight: 800;
            text-transform: uppercase; border-bottom-left-radius: 12px;
            letter-spacing: 0.05em;
        }

        .post-meta { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .post-category {
            padding: 4px 12px; background: var(--accent-primary-glow);
            color: var(--accent-primary); border-radius: 100px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
        }
        .post-read-time { font-size: 0.75rem; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
        .post-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); line-height: 1.4; }
        .post-summary { font-size: 0.9rem; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .post-footer { margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: space-between; }
        
        .btn-read { font-size: 0.875rem; font-weight: 600; color: var(--accent-primary); cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .btn-share-wa {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(37, 211, 102, 0.1); color: #25d366;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s; border: 1px solid rgba(37, 211, 102, 0.2);
        }
        .btn-share-wa:hover { background: #25d366; color: #fff; transform: scale(1.1); }

        /* Modal Architecture */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: var(--bg-secondary); border: 1px solid var(--border-medium);
            border-radius: 24px; width: 100%; max-width: 800px; max-height: 90vh;
            overflow-y: auto; position: relative; box-shadow: var(--shadow-lg);
            display: flex; flex-direction: column;
        }
        .modal-close { position: absolute; top: 20px; right: 20px; z-index: 10; background: rgba(0,0,0,0.3); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; backdrop-filter: blur(4px); }
        .modal-close:hover { background: var(--accent-rose); transform: rotate(90deg); }

        /* Modal Rich Sections */
        .modal-hero { padding: 60px 40px 40px; position: relative; overflow: hidden; }
        .modal-hero::before { content: ''; position: absolute; inset: 0; background: var(--hero-bg, var(--accent-primary)); opacity: 0.15; z-index: -1; }
        .modal-hero-badge { display: inline-block; padding: 4px 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; font-size: 0.75rem; font-weight: 600; margin-bottom: 16px; }
        .modal-title { font-size: clamp(1.5rem, 4vw, 2.25rem); font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
        .modal-meta-row { display: flex; flex-wrap: wrap; gap: 20px; color: var(--text-tertiary); font-size: 0.85rem; font-weight: 500; }
        .modal-meta-item { display: flex; align-items: center; gap: 6px; }

        .modal-content { padding: 40px; }
        .rich-section { margin-bottom: 40px; }
        .rich-section-title { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .rich-section-title svg { width: 20px; height: 20px; color: var(--accent-primary); }

        /* Summary Box */
        .summary-box { background: var(--bg-card); border-left: 4px solid var(--accent-primary); padding: 20px; border-radius: 8px; font-size: 1rem; color: var(--text-secondary); line-height: 1.7; }

        /* Quick Points / Who Should Read */
        .points-list { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .points-item { display: flex; align-items: flex-start; gap: 10px; font-size: 0.95rem; color: var(--text-secondary); }
        .points-item svg { margin-top: 4px; flex-shrink: 0; color: var(--accent-emerald); }

        /* Responsive Table */
        .table-container { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-medium); background: rgba(255,255,255,0.02); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { background: rgba(255,255,255,0.05); text-align: left; padding: 12px 16px; color: var(--text-primary); font-weight: 600; border-bottom: 1px solid var(--border-medium); white-space: nowrap; }
        td { padding: 12px 16px; color: var(--text-secondary); border-bottom: 1px solid var(--border-subtle); }
        tr:last-child td { border-bottom: none; }

        /* Checklist Cards */
        .checklist-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; }
        .check-card { background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 16px; border-radius: 12px; display: flex; gap: 12px; transition: 0.2s; }
        .check-card:hover { border-color: var(--accent-emerald); background: rgba(16, 185, 129, 0.05); }
        .check-icon { width: 20px; height: 20px; border: 2px solid var(--accent-emerald); border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .check-card span { font-size: 0.9rem; color: var(--text-secondary); }

        /* FAQ Accordion */
        .faq-item { border: 1px solid var(--border-subtle); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        .faq-header { padding: 14px 20px; background: rgba(255,255,255,0.02); cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-weight: 600; font-size: 0.95rem; }
        .faq-header:hover { background: rgba(255,255,255,0.04); }
        .faq-content { padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out, padding 0.3s ease; font-size: 0.9rem; color: var(--text-secondary); }
        .faq-item.active .faq-content { max-height: 500px; padding: 14px 20px; border-top: 1px solid var(--border-subtle); }
        .faq-icon { transition: transform 0.3s; }
        .faq-item.active .faq-icon { transform: rotate(180deg); }

        /* Source & Disclaimer */
        .source-box { padding: 16px; background: rgba(59, 130, 246, 0.05); border: 1px dashed var(--border-accent); border-radius: 12px; font-size: 0.85rem; color: var(--text-tertiary); display: flex; align-items: center; gap: 8px; }
        .disclaimer-box { padding: 16px; border-left: 4px solid var(--accent-amber); background: rgba(245, 158, 11, 0.05); font-size: 0.8rem; color: var(--text-tertiary); font-style: italic; border-radius: 4px; line-height: 1.6; }

        /* Sticky Share Button */
        .sticky-share { position: sticky; bottom: 0; left: 0; right: 0; padding: 16px; background: rgba(12, 16, 24, 0.8); backdrop-filter: blur(12px); border-top: 1px solid var(--border-medium); display: flex; justify-content: center; gap: 12px; z-index: 10; }
        .btn-wa-large { background: #25d366; color: #fff; padding: 10px 24px; border-radius: 100px; font-weight: 700; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; box-shadow: 0 8px 16px rgba(37, 211, 102, 0.3); }
        .btn-wa-large:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(37, 211, 102, 0.4); }

        /* CTA Section */
        .modal-cta { margin-top: 20px; padding: 32px; background: linear-gradient(135deg, rgba(59,130,246,0.1) 0%, rgba(99,102,241,0.1) 100%); border-radius: 20px; text-align: center; border: 1px solid var(--border-accent); }
        .modal-cta h4 { font-size: 1.25rem; margin-bottom: 12px; }
        .modal-cta p { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 24px; }
        .cta-btns { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; }
        .btn-cta-primary { background: var(--accent-primary); color: #fff; padding: 10px 24px; border-radius: 8px; font-weight: 600; transition: 0.2s; }
        .btn-cta-secondary { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--border-medium); padding: 10px 24px; border-radius: 8px; font-weight: 600; transition: 0.2s; }
        .btn-cta-primary:hover, .btn-cta-secondary:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

        @media (max-width: 768px) {
            .page-title { font-size: 2rem; }
            .filter-bar { flex-direction: column; align-items: stretch; }
            .search-box { max-width: none; }
            .modal-content { padding: 30px 20px; }
            .modal-hero { padding: 60px 24px 30px; }
            .modal-title { font-size: 1.5rem; }
            .points-list { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <nav class="navbar">
        <div class="navbar-inner">
            <a href="index.html" class="navbar-brand">
                <img src="assets/images/logo.png" alt="CA Office PDF Utility" class="navbar-logo">
                <span class="navbar-brand-text">CA Office <span>PDF Utility</span></span>
            </a>
            <ul class="navbar-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#modules">Features</a></li>
                <li><a href="#" style="color: var(--text-primary); font-weight: 600;">Knowledge Hub</a></li>
                <li><a href="index.html#download" class="navbar-cta">Download App</a></li>
            </ul>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <div class="page-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                Daily Tax & Compliance
            </div>
            <h1 class="page-title">Knowledge Hub</h1>
            <p class="page-subtitle">Your daily dose of professional updates in GST, Income Tax, and ROC compliance. Stay ahead of the curve.</p>
        </div>
    </header>

    <main class="container">
        <div class="filter-bar">
            <div class="filter-categories" id="category-filters">
                <button class="filter-btn active" data-category="All">All Updates</button>
                <button class="filter-btn" data-category="GST Updates">GST</button>
                <button class="filter-btn" data-category="Income Tax">Income Tax</button>
                <button class="filter-btn" data-category="TDS">TDS</button>
                <button class="filter-btn" data-category="ROC / MCA">ROC / MCA</button>
            </div>
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Search posts or tags...">
            </div>
        </div>

        <div class="posts-grid" id="posts-container">
            <!-- Posts will be loaded here -->
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p class="footer-text">&copy; 2026 CA Office PDF Utility. Professional Knowledge Initiative.</p>
        </div>
    </footer>

    <!-- Post Detail Modal -->
    <div class="modal-overlay" id="post-modal">
        <div class="modal-card">
            <button class="modal-close" id="close-modal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="modal-content" id="modal-content">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <script>
        let allPosts = [];
        let currentCategory = 'All';
        let searchQuery = '';

        const postsContainer = document.getElementById('posts-container');
        const modal = document.getElementById('post-modal');
        const modalContent = document.getElementById('modal-content');
        const searchInput = document.getElementById('search-input');
        const categoryBtns = document.querySelectorAll('.filter-btn');

        // Fetch Posts
        const fetchPosts = async () => {
            try {
                const response = await fetch(`data/posts.json?v=${new Date().getTime()}`);
                allPosts = await response.json();
                renderPosts();
                
                const urlParams = new URLSearchParams(window.location.search);
                const postId = urlParams.get('id');
                if (postId) {
                    const post = allPosts.find(p => p.id == postId);
                    if (post && post.status === 'published') openPost(post);
                }

                if (typeof gtag === 'function') {
                    gtag('event', 'knowledge_hub_opened');
                }
            } catch (err) {
                console.error('Failed to load posts:', err);
                postsContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--accent-rose);">Error loading knowledge base. Please try again.</div>';
            }
        };

        // Render Posts Grid
        const renderPosts = () => {
            const filtered = allPosts.filter(post => {
                const isPublished = post.status === 'published';
                const matchesCat = currentCategory === 'All' || post.category === currentCategory;
                const matchesSearch = post.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                     post.summary.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                     post.tags.some(tag => tag.toLowerCase().includes(searchQuery.toLowerCase()));
                return isPublished && matchesCat && matchesSearch;
            });

            if (filtered.length === 0) {
                postsContainer.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: var(--text-tertiary);">No posts found matching your criteria.</div>';
                return;
            }

            postsContainer.innerHTML = filtered.map(post => `
                <div class="post-card">
                    ${post.highlight ? `<div class="post-highlight">${post.highlight}</div>` : ''}
                    <div class="post-meta">
                        <span class="post-category">${post.category}</span>
                        <div class="post-read-time">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                            ${post.readTime || '3 min read'}
                        </div>
                    </div>
                    <h3 class="post-title">${post.title}</h3>
                    <p class="post-summary">${post.summary}</p>
                    <div class="post-footer">
                        <div class="btn-read" onclick="handleReadMore('${post.id}')">
                            Read Update
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </div>
                        <a href="https://wa.me/?text=${encodeURIComponent('Check out this update: ' + post.title + ' - ' + window.location.origin + window.location.pathname + '?id=' + post.id)}" 
                           target="_blank" class="btn-share-wa" onclick="trackShare('${post.id}')">
                            <svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        </a>
                    </div>
                </div>
            `).join('');
        };

        const handleReadMore = (id) => {
            const post = allPosts.find(p => p.id == id);
            if (post) openPost(post);
        };

        const openPost = (post) => {
            modalContent.innerHTML = `
                <div class="modal-hero" style="--hero-bg: ${post.heroColor || 'var(--accent-primary)'}">
                    ${post.highlight ? `<span class="modal-hero-badge">${post.highlight}</span>` : ''}
                    <h2 class="modal-title">${post.title}</h2>
                    <div class="modal-meta-row">
                        <div class="modal-meta-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                            ${formatDate(post.date)}
                        </div>
                        <div class="modal-meta-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                            ${post.category}
                        </div>
                        <div class="modal-meta-item">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

                    </div>

                <div class="modal-content">
                    <div class="rich-section">
                        <div class="summary-box">${post.summary}</div>
                    </div>

                    ${post.quickPoints && post.quickPoints.length > 0 ? `
                        <div class="rich-section">
                            <h4 class="rich-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> Key Highlights</h4>
                            <ul class="points-list">
                                ${post.quickPoints.map(pt => `
                                    <li class="points-item">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                                        <span>${pt}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>
                    ` : ''}

                    ${post.whoShouldRead && post.whoShouldRead.length > 0 ? `
                        <div class="rich-section">
                            <h4 class="rich-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Who Should Read?</h4>
                            <div class="points-list">
                                ${post.whoShouldRead.map(item => `
                                    <div class="points-item">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                                        <span>${item}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    <div class="rich-section">
                        <div style="font-size: 1.05rem; line-height: 1.8; color: var(--text-primary); white-space: pre-wrap;">${post.content}</div>
                    </div>

                    ${post.tableData ? `
                        <div class="rich-section">
                            <h4 class="rich-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg> Data Reference Table</h4>
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>${post.tableData.headers.map(h => `<th>${h}</th>`).join('')}</tr>
                                    </thead>
                                    <tbody>
                                        ${post.tableData.rows.map(row => `
                                            <tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ` : ''}

                    ${post.actionPoints && post.actionPoints.length > 0 ? `
                        <div class="rich-section">
                            <h4 class="rich-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Action Checklist</h4>
                            <div class="checklist-grid">
                                ${post.actionPoints.map(ap => `
                                    <div class="check-card">
                                        <div class="check-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><polyline points="20 6 9 17 4 12"/></svg></div>
                                        <span>${ap}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${post.faqs && post.faqs.length > 0 ? `
                        <div class="rich-section">
                            <h4 class="rich-section-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Frequently Asked Questions</h4>
                            <div class="faq-container">
                                ${post.faqs.map((f, idx) => `
                                    <div class="faq-item">
                                        <div class="faq-header" onclick="toggleFaq(this)">
                                            <span>${f.question}</span>
                                            <svg class="faq-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
                                        </div>
                                        <div class="faq-content">${f.answer}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${post.sourceName ? `
                        <div class="rich-section">
                            <div class="source-box">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                <strong>Source:</strong>
                                ${post.sourceUrl ? `<a href="${post.sourceUrl}" target="_blank" style="color: var(--accent-primary); text-decoration: underline;">${post.sourceName}</a>` : post.sourceName}
                            </div>
                        </div>
                    ` : ''}

                    <div class="rich-section">
                        <div class="disclaimer-box">
                            <strong>Disclaimer:</strong> ${post.disclaimer || 'This is a general knowledge update. Please verify applicable law, notification, circular and facts before taking action.'}
                        </div>
                    </div>

                    <div class="modal-cta">
                        <h4>Need CA Office Automation?</h4>
                        <p>Join 500+ CA professionals using our PDF Utility, Smart Invoice Parser and CMA/DPR Builder.</p>
                        <div class="cta-btns">
                            <a href="index.html#download" class="btn-cta-primary">Download Utility</a>
                            <a href="https://wa.me/919876543210?text=${encodeURIComponent('Hi, I read your post: ' + post.title + '. I want to know more about the Utility.')}" 
                               target="_blank" class="btn-cta-secondary">Contact on WhatsApp</a>
                        </div>
                    </div>
                </div>

                <div class="sticky-share">
                    <a href="https://wa.me/?text=${encodeURIComponent(post.title + ' - ' + window.location.origin + window.location.pathname + '?id=' + post.id)}" 
                       target="_blank" class="btn-wa-large" onclick="trackShare('${post.id}')">
                        <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.937 3.659 1.432 5.631 1.433h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                        Share on WhatsApp
                    </a>
                </div>
            `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            
            window.history.pushState({}, '', `?id=${post.id}`);

            if (typeof gtag === 'function') {
                gtag('event', 'post_read', { 'post_title': post.title, 'category': post.category });
            }
        };

        const closeModal = () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            window.history.pushState({}, '', window.location.pathname);
        };

        const toggleFaq = (header) => {
            const item = header.parentElement;
            item.classList.toggle('active');
        };

        const formatDate = (dateStr) => {
            try {
                return new Date(dateStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
            } catch (e) {
                return dateStr;
            }
        };

        const trackShare = (id) => {
            const post = allPosts.find(p => p.id == id);
            if (typeof gtag === 'function' && post) {
                gtag('event', 'post_shared_whatsapp', { 'post_title': post.title });
            }
        };

        // Events
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPosts();
        });

        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderPosts();

                if (typeof gtag === 'function') {
                    gtag('event', 'category_filter_used', { 'category': currentCategory });
                }
            });
        });

        document.getElementById('close-modal').addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        // Initial Load
        fetchPosts();
    </script>
</body>
</html>
